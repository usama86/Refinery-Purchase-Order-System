name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:frontend
      - run: npm run build:frontend

  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [catalog-service, procurement-service]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev]"
      - run: ruff check .
      - run: pytest

